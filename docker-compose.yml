services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    hostname: local_qdrant
    ports:
      - "6333:6333" # REST API & Web UI Dashboard
      - "6334:6334" # gRPC interface for fast data ingestion
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag-network

  app:
    build: .
    container_name: streamlit_app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./credentials:/app/credentials
      - ./qdrant_storage:/app/qdrant_storage
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/vertex-ai-key.json
      - QDRANT_HOST=local_qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    networks:
      - rag-network
    restart: unless-stopped

networks:
  rag-network:
    driver: bridge