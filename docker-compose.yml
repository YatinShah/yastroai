version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: local_qdrant
    hostname: local_qdrant
    ports:
      - "6333:6333" # REST API & Web UI Dashboard
      - "6334:6334" # gRPC interface for fast data ingestion
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped